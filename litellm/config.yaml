# LiteLLM proxy for SmartCloud's AI risk layer — Gemini via the free-tier key.
# Deployed as a separate worker (see this folder's Dockerfile).
#
# Run locally:
#   export GEMINI_API_KEY=... LITELLM_MASTER_KEY=...
#   litellm --config litellm/config.yaml --port 4000
#
# The app calls the OpenAI-compatible /chat/completions endpoint (see src/lib/ai.ts);
# it sets its own per-request limits, caching, and rate limiting.

model_list:
  - model_name: smartcloud-risk
    litellm_params:
      model: gemini/gemini-2.5-flash
      api_key: os.environ/GEMINI_API_KEY

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
